<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>스크린타임 인증 게시판 | Nopamine</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --bg:       #f8f7f5;
      --surface:  #f0ede9;
      --card:     #ffffff;
      --border:   #e0dbd3;
      --accent:   #3d7a52;
      --accent-h: #2d6a42;
      --accent-bg:#edf5f1;
      --amber:    #9a7530;
      --amber-bg: #fdf5e6;
      --rose:     #b85a52;
      --text:     #1c1a17;
      --muted:    #7a7168;
      --dim:      #aaa098;
    }
    body { background: var(--bg); color: var(--text); }
    .logo { color: var(--accent); font-weight: 900; letter-spacing: .12em; }

    .drop-area {
      border: 1.5px dashed var(--border); border-radius: .75rem; transition: all .2s;
      cursor: pointer; background: var(--surface);
    }
    .drop-area.drag-over, .drop-area:hover { border-color: var(--accent); background: var(--accent-bg); }

    .post-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: .875rem; overflow: hidden; transition: transform .2s, box-shadow .2s; cursor: pointer;
    }
    .post-card:hover { transform: translateY(-3px); box-shadow: 0 10px 28px rgba(0,0,0,.1); }

    .post-img { width: 100%; aspect-ratio: 9/16; object-fit: cover; background: var(--surface); }

    .badge-time {
      position: absolute; top: .4rem; right: .4rem;
      background: rgba(255,255,255,.92); backdrop-filter: blur(6px);
      color: var(--accent); font-size: .65rem; font-weight: 700;
      padding: .18rem .5rem; border-radius: 999px; font-family: monospace;
    }

    #modal { display: none; }
    #modal.open { display: flex; }
    .modal-img { max-height: 80vh; max-width: 90vw; object-fit: contain; border-radius: .5rem; }

    .tag { display: inline-block; padding: .15rem .6rem; border-radius: 999px; font-size: .62rem; font-weight: 700; }
    .tag-safe   { background: #dff0e7; color: var(--accent); }
    .tag-warn   { background: #fdf0d0; color: var(--amber); }
    .tag-danger { background: #fde8e6; color: var(--rose); }
    .tag-crit   { background: #fddde0; color: #c04060; }

    #previewImg { display: none; }

    .form-input {
      width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: .5rem;
      padding: .6rem .85rem; color: var(--text); font-size: .875rem; outline: none; transition: border-color .18s;
    }
    .form-input:focus { border-color: var(--accent); }
    .form-input::placeholder { color: var(--dim); }

    .filter-btn {
      font-size: .72rem; padding: .3rem 1rem; border-radius: 999px;
      border: 1px solid var(--border); color: var(--dim); background: transparent;
      cursor: pointer; transition: all .18s;
    }
    .filter-btn:hover { border-color: var(--muted); color: var(--muted); }
    .filter-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }

    .section-label {
      font-size: .68rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--muted);
    }
  </style>
</head>
<body class="font-sans antialiased min-h-screen flex flex-col">

  <!-- NAV -->
  <nav style="background:rgba(248,247,245,.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);"
       class="fixed top-0 w-full z-50">
    <div class="max-w-6xl mx-auto px-5 h-14 flex items-center justify-between">
      <a href="index.html" class="select-none"><img src="logo.png" alt="Nopamine" style="height:38px;width:auto;display:block;"></a>
      <span style="color:var(--muted);font-size:.8rem;">스크린타임 인증 게시판</span>
    </div>
  </nav>

  <main class="flex-1 pt-20 pb-16 px-4 max-w-6xl mx-auto w-full">

    <!-- Header -->
    <div class="text-center mb-10">
      <p class="section-label mb-2">커뮤니티 인증</p>
      <h1 style="font-size:1.9rem;font-weight:900;letter-spacing:-.02em;margin-bottom:.75rem;">스크린타임 인증 게시판</h1>
      <p style="color:var(--muted);font-size:.9rem;line-height:1.7;">
        내 숏폼 소비 시간을 익명으로 공개해 함께 경각심을 높이세요.<br>
        <span style="color:var(--dim);font-size:.82rem;">부끄럽지 않습니다. 인정하는 순간 변화가 시작됩니다.</span>
      </p>
    </div>

    <!-- Upload Form -->
    <div class="rounded-2xl p-6 md:p-8 mb-12" style="background:var(--card);border:1px solid var(--border);">
      <h2 style="font-size:1rem;font-weight:700;margin-bottom:1.5rem;">나의 스크린타임 인증하기</h2>
      <form id="uploadForm" class="space-y-4">

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label style="display:block;font-size:.7rem;color:var(--muted);font-weight:700;margin-bottom:.4rem;letter-spacing:.06em;text-transform:uppercase;">닉네임 *</label>
            <input id="nickname" type="text" placeholder="예: 탈숏폼도전중" class="form-input" maxlength="20" required />
          </div>
          <div>
            <label style="display:block;font-size:.7rem;color:var(--muted);font-weight:700;margin-bottom:.4rem;letter-spacing:.06em;text-transform:uppercase;">소비 시간</label>
            <input id="timeSpent" type="text" placeholder="예: 2시간 34분" class="form-input" maxlength="20" />
          </div>
        </div>

        <div>
          <label style="display:block;font-size:.7rem;color:var(--muted);font-weight:700;margin-bottom:.4rem;letter-spacing:.06em;text-transform:uppercase;">스크린타임 캡처 *</label>
          <div class="drop-area p-8 text-center" id="dropArea">
            <input type="file" id="fileInput" accept="image/*" class="hidden" />
            <div id="dropPrompt">
              <div style="font-size:1.8rem;margin-bottom:.5rem;">📱</div>
              <p style="color:var(--muted);font-size:.85rem;">클릭하거나 이미지를 드래그해서 업로드</p>
              <p style="color:var(--dim);font-size:.72rem;margin-top:.25rem;">PNG, JPG, JPEG — 최대 5MB</p>
            </div>
            <img id="previewImg" class="mx-auto max-h-48 rounded-lg object-contain" alt="미리보기" />
          </div>
        </div>

        <div>
          <label style="display:block;font-size:.7rem;color:var(--muted);font-weight:700;margin-bottom:.4rem;letter-spacing:.06em;text-transform:uppercase;">한 마디 코멘트</label>
          <textarea id="comment" rows="2" placeholder="예: 반성합니다... 오늘부터 1시간 제한 걸었어요"
                    class="form-input resize-none" maxlength="100"></textarea>
        </div>

        <button type="submit"
                style="width:100%;padding:.75rem 1rem;border-radius:.75rem;background:var(--accent);
                       color:#ffffff;font-weight:700;font-size:.875rem;border:none;cursor:pointer;transition:opacity .18s;">
          📤 인증 게시하기
        </button>
      </form>
    </div>

    <!-- Stats bar -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10" id="statsBar">
      <div class="rounded-xl p-4 text-center" style="background:var(--card);border:1px solid var(--border);">
        <div style="font-size:1.6rem;font-weight:900;color:var(--accent);" id="statTotal">0</div>
        <div style="font-size:.72rem;color:var(--muted);margin-top:.25rem;">총 인증 수</div>
      </div>
      <div class="rounded-xl p-4 text-center" style="background:var(--card);border:1px solid var(--border);">
        <div style="font-size:1.6rem;font-weight:900;color:var(--amber);" id="statToday">0</div>
        <div style="font-size:.72rem;color:var(--muted);margin-top:.25rem;">오늘 인증</div>
      </div>
      <div class="rounded-xl p-4 text-center" style="background:var(--card);border:1px solid var(--border);">
        <div style="font-size:1.6rem;font-weight:900;color:var(--rose);" id="statDanger">0</div>
        <div style="font-size:.72rem;color:var(--muted);margin-top:.25rem;">1시간 초과</div>
      </div>
      <div class="rounded-xl p-4 text-center" style="background:var(--card);border:1px solid var(--border);">
        <div style="font-size:1.6rem;font-weight:900;color:var(--text);" id="statSafe">0</div>
        <div style="font-size:.72rem;color:var(--muted);margin-top:.25rem;">30분 이하</div>
      </div>
    </div>

    <!-- Filter -->
    <div class="flex gap-2 mb-6 flex-wrap">
      <button class="filter-btn active" data-filter="all">전체</button>
      <button class="filter-btn" data-filter="safe">💚 30분 이하</button>
      <button class="filter-btn" data-filter="warn">💛 1~2시간</button>
      <button class="filter-btn" data-filter="danger">🔴 2시간 초과</button>
    </div>

    <!-- Gallery Grid -->
    <div id="gallery" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3"></div>
    <p id="emptyMsg" class="hidden text-center py-20" style="color:var(--dim);font-size:.875rem;">아직 인증 게시물이 없습니다. 첫 번째로 인증해 보세요!</p>

  </main>

  <!-- Image Modal -->
  <div id="modal" class="fixed inset-0 z-[100] flex items-center justify-center p-4"
       style="background:rgba(0,0,0,.6);backdrop-filter:blur(8px)">
    <button id="modalClose" class="absolute top-4 right-4 text-3xl leading-none transition"
            style="color:#ffffff;">&times;</button>
    <div class="max-w-lg w-full rounded-2xl overflow-hidden" style="background:var(--card);border:1px solid var(--border);">
      <img id="modalImg" class="modal-img w-full" alt="" />
      <div class="p-5">
        <div class="flex items-center justify-between mb-2">
          <span id="modalNick" style="font-weight:700;color:var(--text);"></span>
          <span id="modalTag"  class="tag"></span>
        </div>
        <p id="modalTime"    style="color:var(--accent);font-family:monospace;font-size:.875rem;margin-bottom:.25rem;"></p>
        <p id="modalComment" style="color:var(--muted);font-size:.875rem;"></p>
        <p id="modalDate"    style="color:var(--dim);font-size:.72rem;margin-top:.75rem;"></p>
      </div>
    </div>
  </div>

  <script type="module">
    // ── Firebase 초기화 ──────────────────────────────────────────
    import { initializeApp }                                from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query,
             orderBy, onSnapshot }                          from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

    const firebaseConfig = {
      apiKey:            "AIzaSyCc4RAOt9veGwMRsufR0IgvX4vri6ECuIw",
      authDomain:        "nopamine-ade80.firebaseapp.com",
      projectId:         "nopamine-ade80",
      storageBucket:     "nopamine-ade80.firebasestorage.app",
      messagingSenderId: "876157993512",
      appId:             "1:876157993512:web:09a95cb939e3a26ebdab1d",
      measurementId:     "G-8BZJBRZWJT"
    };

    const app     = initializeApp(firebaseConfig);
    const db      = getFirestore(app);
    const storage = getStorage(app);

    // ── 상태 ────────────────────────────────────────────────────
    let posts        = [];
    let activeFilter = 'all';
    let selectedFile = null;   // 업로드할 실제 File 객체

    // ── 상수 ────────────────────────────────────────────────────
    const LEVEL_MAP = {
      safe:   { tag:'💚 30분 이하',  cls:'tag-safe'   },
      warn:   { tag:'💛 1~2시간',    cls:'tag-warn'   },
      danger: { tag:'🔴 2시간 초과', cls:'tag-danger' },
      crit:   { tag:'🚨 3시간 초과', cls:'tag-crit'   },
    };

    // ── 유틸 함수 ────────────────────────────────────────────────
    function getLevel(timeStr) {
      if (!timeStr) return 'warn';
      const nums  = timeStr.match(/\d+/g)?.map(Number) || [];
      const h     = timeStr.includes('시간') ? nums[0] || 0 : 0;
      const m     = timeStr.includes('분')   ? nums[timeStr.includes('시간') ? 1 : 0] || 0 : 0;
      const total = h * 60 + m;
      if (total <= 30)  return 'safe';
      if (total <= 120) return 'warn';
      if (total <= 180) return 'danger';
      return 'crit';
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function timeAgo(iso) {
      const s = (Date.now() - new Date(iso)) / 1000;
      if (s < 60)    return '방금 전';
      if (s < 3600)  return `${Math.floor(s/60)}분 전`;
      if (s < 86400) return `${Math.floor(s/3600)}시간 전`;
      return `${Math.floor(s/86400)}일 전`;
    }

    // ── 갤러리 렌더링 ────────────────────────────────────────────
    function renderGallery() {
      const gallery  = document.getElementById('gallery');
      const emptyMsg = document.getElementById('emptyMsg');

      const filtered = activeFilter === 'all' ? posts : posts.filter(p =>
        p.level === activeFilter || (activeFilter === 'danger' && (p.level === 'danger' || p.level === 'crit'))
      );
      const sorted = [...filtered].sort((a,b) => new Date(b.date) - new Date(a.date));

      // 통계 업데이트
      const today = new Date().toDateString();
      document.getElementById('statTotal').textContent  = posts.length;
      document.getElementById('statToday').textContent  = posts.filter(p => new Date(p.date).toDateString() === today).length;
      document.getElementById('statDanger').textContent = posts.filter(p => p.level === 'danger' || p.level === 'crit').length;
      document.getElementById('statSafe').textContent   = posts.filter(p => p.level === 'safe').length;

      gallery.innerHTML = '';
      if (!sorted.length) { emptyMsg.classList.remove('hidden'); return; }
      emptyMsg.classList.add('hidden');

      sorted.forEach(post => {
        const lv   = LEVEL_MAP[post.level] || LEVEL_MAP.warn;
        const card = document.createElement('div');
        card.className = 'post-card';
        card.innerHTML = `
          <div class="relative">
            ${post.img
              ? `<img src="${post.img}" class="post-img" alt="스크린타임" loading="lazy" />`
              : `<div class="post-img flex flex-col items-center justify-center gap-2">
                   <div style="font-size:2rem;">📱</div>
                   <div style="color:var(--dim);font-size:.7rem;text-align:center;padding:0 .5rem;">캡처 없음</div>
                 </div>`
            }
            ${post.time ? `<div class="badge-time">${post.time}</div>` : ''}
          </div>
          <div class="p-3">
            <div style="display:flex;align-items:center;justify-content:space-between;gap:.25rem;margin-bottom:.25rem;">
              <span style="font-weight:700;font-size:.72rem;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escHtml(post.nick)}</span>
              <span class="tag ${lv.cls}" style="flex:none;">${lv.tag.split(' ')[0]}</span>
            </div>
            ${post.comment ? `<p style="color:var(--muted);font-size:.7rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">${escHtml(post.comment)}</p>` : ''}
            <p style="color:var(--dim);font-size:.65rem;margin-top:.25rem;">${timeAgo(post.date)}</p>
          </div>
        `;
        card.addEventListener('click', () => openModal(post));
        gallery.appendChild(card);
      });
    }

    // ── 모달 ────────────────────────────────────────────────────
    function openModal(post) {
      const lv = LEVEL_MAP[post.level] || LEVEL_MAP.warn;
      document.getElementById('modalImg').src             = post.img || '';
      document.getElementById('modalImg').style.display   = post.img ? '' : 'none';
      document.getElementById('modalNick').textContent    = post.nick;
      document.getElementById('modalTime').textContent    = post.time ? `⏱ ${post.time}` : '';
      document.getElementById('modalComment').textContent = post.comment || '';
      document.getElementById('modalDate').textContent    = new Date(post.date).toLocaleString('ko-KR');
      const tag = document.getElementById('modalTag');
      tag.textContent = lv.tag;
      tag.className   = 'tag ' + lv.cls;
      document.getElementById('modal').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('open');
      document.body.style.overflow = '';
    }

    document.getElementById('modalClose').addEventListener('click', closeModal);
    document.getElementById('modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

    // ── 필터 버튼 ────────────────────────────────────────────────
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeFilter = btn.dataset.filter;
        renderGallery();
      });
    });

    // ── 이미지 드롭/선택 ─────────────────────────────────────────
    const dropArea  = document.getElementById('dropArea');
    const fileInput = document.getElementById('fileInput');

    dropArea.addEventListener('click',    () => fileInput.click());
    dropArea.addEventListener('dragover',  e => { e.preventDefault(); dropArea.classList.add('drag-over'); });
    dropArea.addEventListener('dragleave', () => dropArea.classList.remove('drag-over'));
    dropArea.addEventListener('drop', e => {
      e.preventDefault(); dropArea.classList.remove('drag-over');
      if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', () => { if (fileInput.files[0]) handleFile(fileInput.files[0]); });

    function handleFile(file) {
      if (!file.type.startsWith('image/')) { alert('이미지 파일만 업로드 가능합니다.'); return; }
      if (file.size > 5 * 1024 * 1024)    { alert('5MB 이하 이미지만 업로드 가능합니다.'); return; }
      selectedFile = file;
      const reader = new FileReader();
      reader.onload = e => {
        const prev = document.getElementById('previewImg');
        prev.src = e.target.result;
        prev.style.display = 'block';
        document.getElementById('dropPrompt').style.display = 'none';
      };
      reader.readAsDataURL(file);
    }

    // ── 폼 제출: Storage 업로드 → Firestore 저장 ─────────────────
    document.getElementById('uploadForm').addEventListener('submit', async e => {
      e.preventDefault();
      const nick    = document.getElementById('nickname').value.trim();
      const time    = document.getElementById('timeSpent').value.trim();
      const comment = document.getElementById('comment').value.trim();

      if (!nick)         { alert('닉네임을 입력해 주세요.'); return; }
      if (!selectedFile) { alert('스크린타임 캡처 이미지를 업로드해 주세요.'); return; }

      const btn = e.target.querySelector('button[type=submit]');
      btn.textContent = '⏳ 업로드 중...';
      btn.disabled = true;

      try {
        // 1. Firebase Storage에 이미지 업로드
        const storageRef = ref(storage, `screenshots/${Date.now()}_${selectedFile.name}`);
        await uploadBytes(storageRef, selectedFile);
        const imgUrl = await getDownloadURL(storageRef);

        // 2. Firestore에 게시글 데이터 저장
        await addDoc(collection(db, 'posts'), {
          nick,
          time,
          comment,
          img:   imgUrl,
          level: getLevel(time),
          date:  new Date().toISOString(),
        });

        // 3. 폼 초기화 (갤러리는 onSnapshot이 자동으로 업데이트)
        e.target.reset();
        selectedFile = null;
        fileInput.value = '';
        document.getElementById('previewImg').style.display = 'none';
        document.getElementById('dropPrompt').style.display = '';
        document.getElementById('gallery').scrollIntoView({ behavior:'smooth', block:'start' });

        btn.textContent = '✓ 게시 완료!';
        btn.style.background = '#2a5a37';
        setTimeout(() => {
          btn.textContent      = '📤 인증 게시하기';
          btn.style.background = 'var(--accent)';
          btn.disabled         = false;
        }, 2000);

      } catch (err) {
        console.error('업로드 오류:', err);
        alert('업로드 중 오류가 발생했습니다. 다시 시도해 주세요.');
        btn.textContent      = '📤 인증 게시하기';
        btn.style.background = 'var(--accent)';
        btn.disabled         = false;
      }
    });

    // ── Firestore 실시간 구독 (페이지 로드 & 신규 게시글 자동 반영) ──
    const q = query(collection(db, 'posts'), orderBy('date', 'desc'));
    onSnapshot(q, snapshot => {
      posts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      renderGallery();
    }, err => {
      console.error('Firestore 읽기 오류:', err);
    });
  </script>
</body>
</html>
